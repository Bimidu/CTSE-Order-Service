services:
  order-service:
    build: .
    ports:
      - "6969:6969"
      - "50052:50052"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6969/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
