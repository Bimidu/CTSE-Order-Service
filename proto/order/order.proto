syntax = "proto3";

package order;

option go_package = "github.com/Bimidu/ctse-order-service/proto/order";

// OrderService exposes order data to other microservices (e.g. Mood Experience, Notification Service).
service OrderService {
  rpc GetOrder(GetOrderRequest) returns (OrderResponse);
  rpc GetUserOrders(GetUserOrdersRequest) returns (GetUserOrdersResponse);
  rpc GetUserOrderCount(GetUserOrderCountRequest) returns (GetUserOrderCountResponse);
}

message GetOrderRequest {
  string order_id = 1;
}

message OrderItem {
  string product_id = 1;
  string name = 2;
  double price = 3;
  int32 quantity = 4;
  string mood_tag = 5;
}

message OrderResponse {
  string id = 1;
  string user_id = 2;
  string status = 3;
  double total_amount = 4;
  repeated OrderItem items = 5;
  string created_at = 6;
}

message GetUserOrdersRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetUserOrdersResponse {
  repeated OrderResponse orders = 1;
  int32 total = 2;
}

message GetUserOrderCountRequest {
  string user_id = 1;
}

message GetUserOrderCountResponse {
  int32 count = 1;
}
